<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" width="960" height="540" role="img" aria-label="Flujo unificado: ventas, inventario y facturacion en un solo ERP">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="accent1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00a85c"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
    <filter id="glow1" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="960" height="540" fill="url(#bg1)"/>
  <g opacity="0.35" stroke="#334155" stroke-width="1" fill="none">
    <path d="M0 90h960M0 180h960M0 270h960M0 360h960M0 450h960"/>
    <path d="M120 0v540M240 0v540M360 0v540M480 0v540M600 0v540M720 0v540M840 0v540"/>
  </g>
  <!-- central hub -->
  <circle cx="480" cy="270" r="56" fill="#1e293b" stroke="url(#accent1)" stroke-width="2"/>
  <text x="480" y="265" text-anchor="middle" fill="#e2e8f0" font-family="system-ui,Segoe UI,sans-serif" font-size="13" font-weight="700">ERP</text>
  <text x="480" y="284" text-anchor="middle" fill="#94a3b8" font-family="system-ui,Segoe UI,sans-serif" font-size="10">Odoo</text>
  <!-- three modules -->
  <g filter="url(#glow1)">
    <rect x="180" y="120" width="140" height="88" rx="12" fill="#1e293b" stroke="#00a85c" stroke-width="1.5" opacity="0.9"/>
    <text x="250" y="158" text-anchor="middle" fill="#f1f5f9" font-family="system-ui,sans-serif" font-size="12" font-weight="600">Ventas / CRM</text>
    <text x="250" y="178" text-anchor="middle" fill="#64748b" font-family="system-ui,sans-serif" font-size="10">Cotizaciones</text>
    <rect x="640" y="120" width="140" height="88" rx="12" fill="#1e293b" stroke="#00a85c" stroke-width="1.5" opacity="0.9"/>
    <text x="710" y="158" text-anchor="middle" fill="#f1f5f9" font-family="system-ui,sans-serif" font-size="12" font-weight="600">Inventario</text>
    <text x="710" y="178" text-anchor="middle" fill="#64748b" font-family="system-ui,sans-serif" font-size="10">Stock real</text>
    <rect x="410" y="360" width="140" height="88" rx="12" fill="#1e293b" stroke="#00a85c" stroke-width="1.5" opacity="0.9"/>
    <text x="480" y="398" text-anchor="middle" fill="#f1f5f9" font-family="system-ui,sans-serif" font-size="12" font-weight="600">Facturaci&#243;n</text>
    <text x="480" y="418" text-anchor="middle" fill="#64748b" font-family="system-ui,sans-serif" font-size="10">Un solo dato</text>
  </g>
  <!-- connectors -->
  <path d="M320 164 L424 240" stroke="url(#accent1)" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M640 164 L536 240" stroke="url(#accent1)" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M480 326 L480 360" stroke="url(#accent1)" stroke-width="2" fill="none"/>
  <circle cx="424" cy="240" r="4" fill="#22c55e"/>
  <circle cx="536" cy="240" r="4" fill="#22c55e"/>
  <circle cx="480" cy="326" r="4" fill="#22c55e"/>
</svg>
